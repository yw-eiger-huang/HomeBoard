<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>木板構型示意圖</title>
<link rel="stylesheet" href="Code/board_viz.css">
</head>
<body>
<header>
  <h1>木板構型 — 外傾示意圖</h1>
  <span>side view · 2D · 板厚 5cm · 剛性摺疊</span>
</header>
<div class="main">
  <div class="canvas-wrap">
    <canvas id="c"></canvas>
    <div class="hint">拖曳平移 · 滾輪縮放 · 雙指縮放</div>
  </div>
  <div class="panel">
    <div class="panel-section">
      <h2>參數</h2>
      <div class="param-row">
        <label>牆面夾角</label>
        <input type="range" id="angle" min="0" max="40" step="0.5" value="40">
        <span class="param-val" id="angleVal">40°</span>
      </div>
      <div class="param-row">
        <label>內縮距離</label>
        <input type="range" id="inward" min="100" max="150" step="5" value="100">
        <span class="param-val" id="inwardVal">100cm</span>
      </div>
      <div class="param-row">
        <label>G 離 A</label>
        <input type="range" id="gOffset" min="175" max="215" step="1" value="180">
        <span class="param-val" id="gOffsetVal">180cm</span>
      </div>
      <div class="param-row">
        <label>水平視角</label>
        <input type="range" id="hViewAngle" min="-90" max="90" step="1" value="0">
        <span class="param-val" id="hViewAngleVal">0°</span>
      </div>

    </div>
    <div class="panel-section">
      <h2>顯示</h2>
      <div class="toggle-row"><label>3D 視圖</label><div class="toggle on" id="tog3D"></div></div>
      <div class="toggle-row"><label>標註尺寸</label><div class="toggle on" id="togDims"></div></div>
      <div class="toggle-row"><label>摺疊段</label><div class="toggle on" id="togFold"></div></div>
<div class="toggle-row"><label>G 點 / 剛性桿</label><div class="toggle on" id="togQuarter"></div></div>
      <div class="toggle-row"><label>圓孔</label><div class="toggle on" id="togScrewHoles"></div></div>
      <div class="toggle-row"><label>邊框標示</label><div class="toggle on" id="togBorderMark"></div></div>
      <div class="param-row" id="borderMarkWidthRow">
        <label>邊框寬</label>
        <input type="range" id="borderMarkWidth" min="3.6" max="10" step="0.1" value="5">
        <span class="param-val" id="borderMarkWidthVal">5.0cm</span>
      </div>
      <div class="param-row" id="borderMarkJunctionWidthRow">
        <label>交接處寬</label>
        <input type="range" id="borderMarkJunctionWidth" min="3" max="5" step="0.1" value="3">
        <span class="param-val" id="borderMarkJunctionWidthVal">3.0cm</span>
      </div>
    </div>
    <div class="panel-section">
      <h2>固定值</h2>
      <div class="stat-row"><span class="stat-label">木板全長</span><span class="stat-val yellow">3.048 m</span></div>
      <div class="stat-row"><span class="stat-label">摺疊段長</span><span class="stat-val yellow">65 cm</span></div>
      <div class="stat-row"><span class="stat-label">板厚</span><span class="stat-val yellow">5 cm</span></div>
      <div class="stat-row"><span class="stat-label">天花板高</span><span class="stat-val yellow">2.500 m</span></div>
      <div class="stat-row"><span class="stat-label">A 離牆（靠牆側）</span><span class="stat-val blue">1.959 m</span></div>
    </div>
  </div>
</div>
<script type="module" src="Code/board_viz.js"></script>
</body>
</html>
