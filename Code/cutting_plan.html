<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cutting Plan</title>
<style>
  body { margin: 0; background: #F5F0EA; font-family: monospace; }
  svg { display: block; }
</style>
</head>
<body>
<svg id="svg" xmlns="http://www.w3.org/2000/svg" width="900" height="1080">

  <!-- Background -->
  <rect width="900" height="1080" fill="#F5F0EA"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#333">Cutting Plan — 244 × 122 cm panels, 5 mm kerf</text>

  <!-- Legend -->
  <rect x="30"  y="52" width="14" height="14" fill="#C4894A" rx="2"/>
  <text x="50"  y="63" font-size="12" fill="#555">Main board (M)</text>
  <rect x="155" y="52" width="14" height="14" fill="#7AB8E8" rx="2"/>
  <text x="175" y="63" font-size="12" fill="#555">Fold panel (F)</text>
  <rect x="275" y="52" width="14" height="14" fill="#D8D0C8" rx="2"/>
  <text x="295" y="63" font-size="12" fill="#555">Waste</text>

  <!-- ============================================================
       PANEL TEMPLATE: width=366px (244cm), height=183px (122cm)
       scale = 1.5 px/cm
       kerf = 0.75px
       Layout origin per panel defined by translate()
  ============================================================ -->

  <!-- PANEL 1 — M2 (90 cm main) -->
  <g transform="translate(30, 80)">
    <text x="0" y="-8" font-size="13" font-weight="bold" fill="#333">Panel 1 — M2</text>
    <!-- border -->
    <rect x="0" y="0" width="366" height="183" fill="none" stroke="#888" stroke-width="1.5"/>
    <!-- M2: 90cm tall (135px), 239.8cm wide (359.7px) -->
    <rect x="0" y="0" width="359.7" height="135" fill="#C4894A"/>
    <text x="179.85" y="72" text-anchor="middle" font-size="13" fill="white" font-weight="bold">M2  90 × 239.8 cm</text>
    <!-- end stub waste (4.2cm = 6.3px) -->
    <rect x="360.45" y="0" width="5.55" height="135" fill="#D8D0C8"/>
    <!-- kerf line -->
    <line x1="0" y1="135.75" x2="366" y2="135.75" stroke="#555" stroke-width="0.75" stroke-dasharray="4,3"/>
    <!-- waste strip 31.5cm (47.25px) -->
    <rect x="0" y="135.75" width="366" height="47.25" fill="#D8D0C8"/>
    <text x="183" y="162" text-anchor="middle" font-size="11" fill="#888">waste  31.5 × 239.8 cm</text>
    <!-- dimension labels -->
    <text x="179.85" y="178" text-anchor="middle" font-size="10" fill="#777">239.8 cm</text>
    <text x="-8" y="72" text-anchor="middle" font-size="10" fill="#777" transform="rotate(-90,-8,72)">90 cm</text>
    <!-- panel size label -->
    <text x="366" y="195" text-anchor="end" font-size="10" fill="#aaa">244 × 122 cm</text>
  </g>

  <!-- PANEL 2 — M3 (90 cm main) -->
  <g transform="translate(450, 80)">
    <text x="0" y="-8" font-size="13" font-weight="bold" fill="#333">Panel 2 — M3</text>
    <rect x="0" y="0" width="366" height="183" fill="none" stroke="#888" stroke-width="1.5"/>
    <rect x="0" y="0" width="359.7" height="135" fill="#C4894A"/>
    <text x="179.85" y="72" text-anchor="middle" font-size="13" fill="white" font-weight="bold">M3  90 × 239.8 cm</text>
    <rect x="360.45" y="0" width="5.55" height="135" fill="#D8D0C8"/>
    <line x1="0" y1="135.75" x2="366" y2="135.75" stroke="#555" stroke-width="0.75" stroke-dasharray="4,3"/>
    <rect x="0" y="135.75" width="366" height="47.25" fill="#D8D0C8"/>
    <text x="183" y="162" text-anchor="middle" font-size="11" fill="#888">waste  31.5 × 239.8 cm</text>
    <text x="366" y="195" text-anchor="end" font-size="10" fill="#aaa">244 × 122 cm</text>
  </g>

  <!-- PANEL 3 — M4 (90 cm main) -->
  <g transform="translate(30, 320)">
    <text x="0" y="-8" font-size="13" font-weight="bold" fill="#333">Panel 3 — M4</text>
    <rect x="0" y="0" width="366" height="183" fill="none" stroke="#888" stroke-width="1.5"/>
    <rect x="0" y="0" width="359.7" height="135" fill="#C4894A"/>
    <text x="179.85" y="72" text-anchor="middle" font-size="13" fill="white" font-weight="bold">M4  90 × 239.8 cm</text>
    <rect x="360.45" y="0" width="5.55" height="135" fill="#D8D0C8"/>
    <line x1="0" y1="135.75" x2="366" y2="135.75" stroke="#555" stroke-width="0.75" stroke-dasharray="4,3"/>
    <rect x="0" y="135.75" width="366" height="47.25" fill="#D8D0C8"/>
    <text x="183" y="162" text-anchor="middle" font-size="11" fill="#888">waste  31.5 × 239.8 cm</text>
    <text x="366" y="195" text-anchor="end" font-size="10" fill="#aaa">244 × 122 cm</text>
  </g>

  <!-- PANEL 4 — F1 + F3 + M1 -->
  <g transform="translate(450, 320)">
    <text x="0" y="-8" font-size="13" font-weight="bold" fill="#333">Panel 4 — F1 + F3 + M1</text>
    <rect x="0" y="0" width="366" height="183" fill="none" stroke="#888" stroke-width="1.5"/>

    <!-- F1: 118cm wide (177px), 65cm tall (97.5px) -->
    <rect x="0" y="0" width="177" height="97.5" fill="#7AB8E8"/>
    <text x="88.5" y="50" text-anchor="middle" font-size="12" fill="white" font-weight="bold">F1</text>
    <text x="88.5" y="65" text-anchor="middle" font-size="10" fill="white">118 × 65 cm</text>

    <!-- kerf between F1 and F3 -->
    <line x1="177.75" y1="0" x2="177.75" y2="97.5" stroke="#555" stroke-width="0.75" stroke-dasharray="4,3"/>

    <!-- F3: 118cm wide, starts at 177.75+0.75=178.5... actually x=177.75, width=177 -->
    <rect x="178.5" y="0" width="177" height="97.5" fill="#7AB8E8"/>
    <text x="267" y="50" text-anchor="middle" font-size="12" fill="white" font-weight="bold">F3</text>
    <text x="267" y="65" text-anchor="middle" font-size="10" fill="white">118 × 65 cm</text>

    <!-- small waste end: 7cm = 10.5px, starts at 355.5 -->
    <rect x="355.5" y="0" width="10.5" height="97.5" fill="#D8D0C8"/>
    <text x="360.75" y="52" text-anchor="middle" font-size="8" fill="#999" transform="rotate(-90,360.75,52)">7 cm</text>

    <!-- horizontal kerf -->
    <line x1="0" y1="98.25" x2="366" y2="98.25" stroke="#555" stroke-width="0.75" stroke-dasharray="4,3"/>

    <!-- M1: 48cm tall (72px), 239.8cm wide (359.7px) -->
    <rect x="0" y="99" width="359.7" height="72" fill="#C4894A"/>
    <text x="179.85" y="138" text-anchor="middle" font-size="12" fill="white" font-weight="bold">M1  48 × 239.8 cm</text>

    <!-- end stub -->
    <rect x="360.45" y="99" width="5.55" height="72" fill="#D8D0C8"/>

    <!-- bottom waste: 8.5cm = 12.75px -->
    <line x1="0" y1="171.75" x2="366" y2="171.75" stroke="#555" stroke-width="0.75" stroke-dasharray="4,3"/>
    <rect x="0" y="172.5" width="366" height="10.5" fill="#D8D0C8"/>
    <text x="183" y="180" text-anchor="middle" font-size="9" fill="#999">waste 8.5 cm</text>

    <!-- dimension callouts -->
    <text x="88.5" y="8" text-anchor="middle" font-size="9" fill="#cce8f8">118 cm</text>
    <text x="267" y="8" text-anchor="middle" font-size="9" fill="#cce8f8">118 cm</text>
    <text x="-8" y="50" text-anchor="middle" font-size="9" fill="#7AB8E8" transform="rotate(-90,-8,50)">65 cm</text>
    <text x="-8" y="135" text-anchor="middle" font-size="9" fill="#C4894A" transform="rotate(-90,-8,135)">48 cm</text>
    <text x="366" y="195" text-anchor="end" font-size="10" fill="#aaa">244 × 122 cm</text>
  </g>

  <!-- PANEL 5 — F2 + M5 -->
  <g transform="translate(30, 560)">
    <text x="0" y="-8" font-size="13" font-weight="bold" fill="#333">Panel 5 — F2 + M5</text>
    <rect x="0" y="0" width="366" height="183" fill="none" stroke="#888" stroke-width="1.5"/>

    <!-- F2: 130cm wide (195px), 65cm tall (97.5px) -->
    <rect x="0" y="0" width="195" height="97.5" fill="#7AB8E8"/>
    <text x="97.5" y="50" text-anchor="middle" font-size="12" fill="white" font-weight="bold">F2</text>
    <text x="97.5" y="65" text-anchor="middle" font-size="10" fill="white">130 × 65 cm</text>

    <!-- vertical kerf -->
    <line x1="195.75" y1="0" x2="195.75" y2="97.5" stroke="#555" stroke-width="0.75" stroke-dasharray="4,3"/>

    <!-- waste right of F2: 113.5cm = 170.25px -->
    <rect x="196.5" y="0" width="169.5" height="97.5" fill="#D8D0C8"/>
    <text x="281.25" y="52" text-anchor="middle" font-size="11" fill="#999">waste  113.5 × 65 cm</text>

    <!-- horizontal kerf -->
    <line x1="0" y1="98.25" x2="366" y2="98.25" stroke="#555" stroke-width="0.75" stroke-dasharray="4,3"/>

    <!-- M5: 48cm tall (72px), 239.8cm wide (359.7px) -->
    <rect x="0" y="99" width="359.7" height="72" fill="#C4894A"/>
    <text x="179.85" y="138" text-anchor="middle" font-size="12" fill="white" font-weight="bold">M5  48 × 239.8 cm</text>

    <!-- end stub -->
    <rect x="360.45" y="99" width="5.55" height="72" fill="#D8D0C8"/>

    <!-- bottom waste -->
    <line x1="0" y1="171.75" x2="366" y2="171.75" stroke="#555" stroke-width="0.75" stroke-dasharray="4,3"/>
    <rect x="0" y="172.5" width="366" height="10.5" fill="#D8D0C8"/>
    <text x="183" y="180" text-anchor="middle" font-size="9" fill="#999">waste 8.5 cm</text>

    <!-- dimension callouts -->
    <text x="97.5" y="8" text-anchor="middle" font-size="9" fill="#cce8f8">130 cm</text>
    <text x="-8" y="50" text-anchor="middle" font-size="9" fill="#7AB8E8" transform="rotate(-90,-8,50)">65 cm</text>
    <text x="-8" y="135" text-anchor="middle" font-size="9" fill="#C4894A" transform="rotate(-90,-8,135)">48 cm</text>
    <text x="366" y="195" text-anchor="end" font-size="10" fill="#aaa">244 × 122 cm</text>
  </g>

  <!-- Summary box -->
  <rect x="450" y="560" width="420" height="130" rx="8" fill="white" stroke="#ccc" stroke-width="1"/>
  <text x="660" y="582" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">Summary</text>
  <text x="470" y="604" font-size="12" fill="#555">Panels 1–3  M2, M3, M4  (90 cm main sections)</text>
  <text x="470" y="624" font-size="12" fill="#555">Panel 4      F1 + F3 + M1  (fold left/right + narrow main)</text>
  <text x="470" y="644" font-size="12" fill="#555">Panel 5      F2 + M5  (fold centre + narrow main)</text>
  <line x1="460" y1="656" x2="860" y2="656" stroke="#ddd" stroke-width="1"/>
  <text x="470" y="674" font-size="12" fill="#333" font-weight="bold">Total: 5 panels</text>
  <text x="470" y="690" font-size="11" fill="#888">Scale 1.5 px/cm  |  kerf = 0.5 cm (dashed lines)</text>

</svg>
</body>
</html>
